name: CI

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  build-test-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Checkout OrionServerBE
        uses: actions/checkout@v4
        with:
          repository: OrionBedrock/OrionServerBE
          ref: development
          path: OrionServerBE

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Pack Orion SDK from server checkout
        run: bash scripts/ci-setup-server-sdk.sh

      - name: Build plugin
        run: |
          rm -rf "$HOME/.cache/orion-plugin-build"
          dotnet restore OrionBuilding.csproj --configfile nuget.config --force-evaluate
          dotnet build OrionBuilding.csproj -c Release --configfile nuget.config --no-restore

      - name: Unit tests
        run: |
          dotnet restore tests/Orion.Plugins.Building.Tests/Orion.Plugins.Building.Tests.csproj --configfile nuget.config --force-evaluate
          dotnet test tests/Orion.Plugins.Building.Tests/Orion.Plugins.Building.Tests.csproj -c Release --no-restore --verbosity minimal

      - name: Smoke boot server with plugin
        env:
          PLUGIN_DEP_DIRS: ""
        run: bash scripts/ci-smoke-server.sh
